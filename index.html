<!DOCTYPE html>

            background: radial-gradient(circle at top right, #EEF2FF 0%, #F8FAFF 100%);
        }
        @keyframes zoom-in { 
            from { transform: scale(0.95); opacity: 0; } 
            to { transform: scale(1); opacity: 1; } 
        }
        @keyframes fade-in { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-zoom-in { animation: zoom-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-fade-in { animation: fade-in 0.5s ease-out both; }

            background-position: right 1.5rem center;

        .role-card:hover {
            transform: translateY(-8px);

        }

                            <i data-lucide="graduation-cap" class="w-8 h-8 md:w-10 md:h-10"></i>
                        </div>
                        <h3 class="text-lg md:text-xl font-black text-slate-800 mb-2">Guru</h3>
                        <p class="text-slate-400 text-[10px] md:text-xs font-medium hidden sm:block">Akses profil pendidik & administrasi mengajar</p>
                    </button>

                    <button onclick="selectRole('tendik')" class="role-card group bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[2.5rem] border border-slate-100 transition-all duration-300 flex flex-col items-center text-center">

                        </div>
                        <h3 class="text-lg md:text-xl font-black text-slate-800 mb-2">Staf Tendik</h3>
                        <p class="text-slate-400 text-[10px] md:text-xs font-medium hidden sm:block">Akses data kependidikan & arsip operasional</p>
                    </button>
                </div>
            </div>

            { text: "Jagalah lisanmu, jangan biarkan ia menyebut kekurangan orang lain, sebab engkau pun punya kekurangan dan orang lain pun punya lisan.", author: "Imam Syafi'i" },
            { text: "Kecantikan itu bukan dengan pakaian yang menghiasi kita, tapi kecantikan itu adalah kecantikan ilmu dan adab.", author: "Ali bin Abi Thalib" }
        ];

        let selectedRoleType = '';
        let activeTab = 'pendidik';
        let searchTerm = '';

        const roleScreen = document.getElementById('role-screen');
        const loginScreen = document.getElementById('login-screen');
        const mainDashboard = document.getElementById('main-dashboard');
        const loginForm = document.getElementById('login-form');
        const nameDropdown = document.getElementById('name-dropdown');
        const personGrid = document.getElementById('person-grid');
        const emptyState = document.getElementById('empty-state');

        function updateQuote() {
            const quoteElement = document.getElementById('quote-text');
            const authorElement = document.getElementById('quote-author');
            const randomIndex = Math.floor(Math.random() * islamicQuotes.length);
            const quote = islamicQuotes[randomIndex];
            
            quoteElement.innerText = `"${quote.text}"`;
            authorElement.innerText = `— ${quote.author}`;
        }

        function selectRole(role) {
            selectedRoleType = role;
            roleScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            
            const list = role === 'pendidik' ? pendidikData : tendikData;
            nameDropdown.innerHTML = '<option value="" disabled selected>Pilih nama anda...</option>' + 
                list.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

            const iconContainer = document.getElementById('login-icon-container');
            const icon = document.getElementById('login-icon');
            const title = document.getElementById('login-title');
            
            if (role === 'pendidik') {
                iconContainer.className = "w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl mb-4 transform -rotate-3 transition-colors";
                icon.setAttribute('data-lucide', 'graduation-cap');
                title.innerText = "Login Guru";
            } else {
                iconContainer.className = "w-16 h-16 bg-rose-600 rounded-2xl flex items-center justify-center text-white shadow-xl mb-4 transform -rotate-3 transition-colors";
                icon.setAttribute('data-lucide', 'briefcase');
                title.innerText = "Login Staf";
            }
            lucide.createIcons();
        }

        function backToRoles() {
            loginScreen.classList.add('hidden');
            roleScreen.classList.remove('hidden');
            updateQuote();
        }

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            const selectedId = nameDropdown.value;
            const pass = document.getElementById('password').value;

            if (selectedId && pass === "20300486") {
                const data = selectedRoleType === 'pendidik' ? pendidikData : tendikData;
                const person = data.find(p => p.id == selectedId);
                
                loginScreen.classList.add('hidden');
                mainDashboard.classList.remove('hidden');
                document.getElementById('user-display').innerText = `User: ${person.name}`;
                activeTab = selectedRoleType; 
                render();
                
                setTimeout(() => {
                    openModal(person.id, selectedRoleType);
                }, 400);
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        };

        function logout() {
            mainDashboard.classList.add('hidden');
            roleScreen.classList.remove('hidden');
            document.getElementById('password').value = '';
            document.getElementById('login-error').classList.add('hidden');
            updateQuote();
        }

        function switchTab(tab) {
            activeTab = tab;
            render();
        }

        function handleSearch() {
            searchTerm = document.getElementById('search-input').value.toLowerCase();
            render();
        }

        function render() {
            const btnPendidik = document.getElementById('tab-pendidik');
            const btnTendik = document.getElementById('tab-tendik');
            const activeClass = 'bg-indigo-600 text-white shadow-lg shadow-indigo-100';
            const inactiveClass = 'text-slate-400 hover:text-indigo-600';

            btnPendidik.className = `flex-1 md:flex-none px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'pendidik' ? activeClass : inactiveClass}`;
            btnTendik.className = `flex-1 md:flex-none px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'tendik' ? activeClass : inactiveClass}`;

            const data = activeTab === 'pendidik' ? pendidikData : tendikData;
            const filtered = data.filter(p => p.name.toLowerCase().includes(searchTerm));
            
            if (filtered.length === 0) {
                personGrid.innerHTML = '';
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                personGrid.innerHTML = filtered.map(person => {
                    const isMale = person.gender === 'male';
                    const themeColor = isMale ? 'indigo' : 'rose';
                    return `
                        <div onclick="openModal(${person.id}, '${activeTab}')" class="group cursor-pointer animate-zoom-in">
                            <div class="relative bg-white/60 hover:bg-white rounded-[2rem] p-5 transition-all duration-500 hover:-translate-y-2 shadow-sm hover:shadow-2xl hover:shadow-indigo-100 border border-white flex flex-col items-center">
                                <div class="w-16 h-16 rounded-2xl p-0.5 bg-gradient-to-br from-${themeColor}-600 to-${themeColor}-400 mb-3 transition-transform group-hover:rotate-3">
                                    <div class="w-full h-full bg-white rounded-[0.9rem] overflow-hidden flex items-center justify-center">
                                        <i data-lucide="${isMale ? 'user' : 'user-round'}" class="w-8 h-8 text-slate-300"></i>
                                    </div>
                                </div>
                                <h3 class="text-[13px] font-black text-slate-800 text-center leading-tight mb-1 group-hover:text-indigo-600">${person.name}</h3>
                                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">${person.role}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            lucide.createIcons();
        }

        function openModal(id, tab) {
            const data = tab === 'pendidik' ? pendidikData : tendikData;
            const person = data.find(p => p.id == id);
            const isMale = person.gender === 'male';
            const themeColor = isMale ? 'indigo' : 'rose';

            document.getElementById('modal-content').innerHTML = `
                <div class="relative">
                    <div class="h-14 bg-gradient-to-r from-${themeColor}-600 to-${themeColor}-500"></div>
                    <button onclick="closeModalAndExit()" class="absolute top-2.5 right-2.5 p-1.5 bg-black/10 hover:bg-black/20 text-white rounded-full transition-all">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                    
                    <div class="px-5 pb-6 -mt-7 text-center relative z-10">
                        <div class="w-16 h-16 rounded-[1.5rem] p-0.5 bg-white shadow-lg mb-3 mx-auto">
                            <div class="w-full h-full bg-${themeColor}-50 rounded-[1.3rem] flex items-center justify-center">
                                <i data-lucide="${isMale ? 'user' : 'user-round'}" class="w-8 h-8 text-${themeColor}-300"></i>
                            </div>
                        </div>
                        
                        <h2 class="text-base font-black text-slate-900 leading-tight">${person.name}</h2>
                        <p class="text-[8px] font-black uppercase tracking-widest text-${themeColor}-500 mt-1">${person.role}</p>
                        
                        <div class="mt-6 space-y-2">
                            <a href="${person.linkDrive1}" target="_blank" class="flex items-center gap-3 p-3 bg-slate-50 hover:bg-white border border-slate-100 rounded-[1.2rem] transition-all group hover:shadow-md">
                                <div class="w-8 h-8 bg-white rounded-xl flex items-center justify-center shadow-sm text-indigo-500 group-hover:bg-indigo-50 transition-colors">
                                    <i data-lucide="file-text" size="14"></i>
                                </div>
                                <div class="text-left">
                                    <p class="text-[9px] font-black uppercase tracking-wider text-slate-800">Biodata</p>
                                    <p class="text-[7px] font-medium text-slate-400 leading-none mt-0.5">Lihat data personil</p>
                                </div>
                            </a>
                            <a href="${person.linkDrive2}" target="_blank" class="flex items-center gap-3 p-3 bg-slate-50 hover:bg-white border border-slate-100 rounded-[1.2rem] transition-all group hover:shadow-md">
                                <div class="w-8 h-8 bg-white rounded-xl flex items-center justify-center shadow-sm text-emerald-500 group-hover:bg-emerald-50 transition-colors">
                                    <i data-lucide="archive" size="14"></i>
                                </div>
                                <div class="text-left">
                                    <p class="text-[9px] font-black uppercase tracking-wider text-slate-800">Arsip</p>
                                    <p class="text-[7px] font-medium text-slate-400 leading-none mt-0.5">Unduh berkas digital</p>
                                </div>
                            </a>
                        </div>

                        <button onclick="closeModalAndExit()" class="w-full mt-6 py-2.5 bg-slate-900 text-white rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-black transition-all flex items-center justify-center gap-2">
                            Tutup <i data-lucide="arrow-left" size="12"></i>
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('modal-container').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModalAndExit() {
            document.getElementById('modal-container').classList.add('hidden');
            logout(); 
        }

        window.onload = () => {
            lucide.createIcons();
            updateQuote();
        };
    </script>
</body>
</html>
